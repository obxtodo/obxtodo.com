name: Daily Build
on:
  schedule:
    - cron: '5 4 * * *' # Runs at 4:05 AM UTC (approx. midnight Eastern)
  workflow_dispatch: # Allows you to trigger it manually too
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages rebuild
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/pages/builds \
          -H "Authorization: token ${{ secrets.SYNC_TOKEN }}"
