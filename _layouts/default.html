<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <style>
    /* 1. MASTER THEME RESET */
    html, body {
      background-color: #ffffff !important;
      background-image: none !important;
      color: #333333 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    /* 2. CONTAINER CONSTRAINTS (The "Normal Size" Fix) */
    .wrapper {
      width: 90% !important;
      max-width: 1000px !important; /* Keeps site from getting super wide */
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING */
    header {
      width: 100% !important;
      float: none !important;
      position: static !important;
      text-align: center !important;
      padding: 60px 0 30px 0 !important;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2rem !important;
      margin: 0 !important;
    }

    header h1 a {
      color: #222 !important;
      text-decoration: none !important;
    }

    header p {
      color: #888 !important;
      font-size: 1rem !important;
      margin-top: 10px !important;
    }

    /* 4. CONTENT SECTION */
    section {
      width: 100% !important;
      float: none !important;
      padding: 0 !important;
    }

    /* 5. FLEXBOX LAYOUT (Image Left / Text Right) */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 50px;
      align-items: flex-start;
      margin-top: 20px;
    }

    .post-media {
      flex: 1.2; /* Slightly more room for the images */
      max-width: 550px;
    }

    .post-content {
      flex: 1;
    }

    .post-content h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    /* 6. GALLERY GRID (Homepage) */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important;
      gap: 25px !important;
      padding-bottom: 50px;
    }

    .gallery-item {
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    /* 7. HIDE THEME ARTIFACTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr {
      display: none !important;
    }

    /* 8. RESPONSIVE MOBILE FIX */
    @media (max-width: 768px) {
      .post-container {
        flex-direction: column;
      }
      .post-media, .post-content {
        max-width: 100%;
        width: 100%;
      }
      header {
        padding: 30px 0 !important;
      }
    }

    /* IMAGE STYLING */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
    </header>

    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
