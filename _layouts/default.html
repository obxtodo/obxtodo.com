<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* 1. MASTER THEME RESET */
    html, body {
      background-color: #ffffff !important;
      color: #5a5a5a !important; 
      font-family: 'Montserrat', sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    /* Elegant Serif for Titles */
    header h1, h2, h3, .post-content h2 {
      font-family: 'Lora', serif !important;
      font-weight: 700 !important;
      color: #2c3e50 !important;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING (Frosted Glass & Centered) */
    header {
      position: sticky !important;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.92) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 35px 0 !important; 
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      text-align: center !important;
      width: 100%;
      margin-bottom: 50px;
    }
/* 3.1 LOGO & TITLE ALIGNMENT */
    .logo-container {
      display: flex;
      align-items: center; /* Vertically centers logo with text */
      justify-content: center; /* Keeps everything in the middle */
      gap: 20px; /* Space between logo and text */
      margin-bottom: 5px;
    }

    .site-logo {
      height: 60px; /* Adjust based on your logo's proportions */
      width: auto;
      transition: transform 0.3s ease;
    }

    .site-logo:hover {
      transform: rotate(-5deg) scale(1.1); /* Adds a little 'dynamic' personality */
    }

    /* Adjust H1 to ensure it doesn't force a new line */
    header h1 {
      font-size: 3.2rem !important;
      font-style: italic;
      margin: 0 !important;
      display: inline-block;
    }
    
    header h1 a { color: #2c3e50 !important; text-decoration: none !important; transition: opacity 0.3s ease; }
    header h1 a:hover { opacity: 0.7; }

    header p {
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 0.8rem !important;
      color: #95a5a6 !important;
      margin-top: 15px !important;
    }

    /* 4. NAVIGATION */
    nav { margin-top: 30px; }
    nav a {
      font-family: 'Montserrat', sans-serif !important;
      font-size: 0.75rem !important;
      letter-spacing: 2px;
      font-weight: 600;
      margin: 0 18px;
      color: #2c3e50 !important;
      text-decoration: none !important;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 6px;
      display: inline-block;
      transition: color 0.3s ease;
    }
    
    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 50%;
      background-color: #3498db;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
    }
    
    nav a:hover::after, nav a.active::after { width: 70%; }
    nav a:hover, nav a.active { color: #3498db !important; }

    /* 5. SPLIDE CUSTOMIZATION */
    .splide__pagination__page {
      background: #ddd !important;
      border-radius: 0 !important;
      width: 25px !important;
      height: 3px !important;
      border: none !important;
      margin: 0 5px !important;
      transition: all 0.3s ease !important;
    }
    .splide__pagination__page.is-active { background: #3498db !important; width: 45px !important; }

    /* 6. FLEXBOX FOR POSTS */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
    }
    .post-media { flex: 1.3; max-width: 600px; }
    .post-content { flex: 1; }
    .post-content h2 { font-size: 2.2rem; margin-bottom: 15px; }

    /* 7. HOMEPAGE GRID & DYNAMIC EFFECTS */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
      gap: 40px !important;
      padding-bottom: 80px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gallery-item {
      border: none !important;
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
      position: relative;
    }

    /* Staggered Delay */
    .gallery-item:nth-child(1) { animation-delay: 0.1s; }
    .gallery-item:nth-child(2) { animation-delay: 0.2s; }
    .gallery-item:nth-child(3) { animation-delay: 0.3s; }
    .gallery-item:nth-child(4) { animation-delay: 0.4s; }

    .gallery-item:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
    }

    /* The Secret Sauce Wrap */
    .gallery-image-wrap {
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden; 
      border-radius: 16px 16px 0 0;
      position: relative;
    }

    .gallery-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.6s ease;
    }

    .gallery-item:hover .gallery-image-wrap img {
      transform: scale(1.1);
      filter: brightness(1.05) contrast(1.05);
    }

    .gallery-item h3 {
      padding: 20px;
      margin: 0;
      background: #ffffff;
      position: relative;
      z-index: 10;
    }

    /* 1. Toggle Button (The 3 Bars) */
.menu-toggle {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1002;
}

.bar {
  width: 25px;
  height: 2px;
  background-color: #2c3e50;
  transition: 0.3s;
}

/* 2. The Side Menu Panel */
.side-menu {
  height: 100%;
  width: 300px;
  position: fixed;
  z-index: 2000;
  top: 0;
  left: -300px; /* Hidden by default */
  background-color: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  overflow-x: hidden;
  transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  box-shadow: 10px 0 30px rgba(0,0,0,0.05);
  padding-top: 60px;
}

/* When the menu is "Open" */
.side-menu.open {
  transform: translateX(300px);
}

/* 3. Menu Links Styling */
.menu-links {
  display: flex;
  flex-direction: column;
  padding: 20px 40px;
}

.menu-links a {
  font-family: 'Montserrat', sans-serif;
  padding: 15px 0;
  text-decoration: none;
  font-size: 1.1rem;
  color: #2c3e50;
  font-weight: 500;
  transition: 0.3s;
}

.menu-links a:hover { color: #3498db; }

.menu-label {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #95a5a6;
  margin-top: 20px;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 25px;
  font-size: 36px;
  text-decoration: none;
  color: #2c3e50;
}

.instagram-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px;
  background: #2c3e50; /* Match your header text color */
  color: #fff !important;
  border-radius: 50px; /* Rounded pill shape looks more modern */
  text-decoration: none !important;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.instagram-btn i {
  font-size: 1.2rem;
}

.instagram-btn:hover {
  background: #58C896; /* Instagram Pink */
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

    /* 8. HIDE THEME ARTIFACTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr { display: none !important; }

    /* 9. RESPONSIVE FIXES */
    @media (max-width: 768px) {
      .post-container { flex-direction: column; }
      .post-media, .post-content { width: 100%; }
      header { padding: 30px 0 !important; }
      header h1 { font-size: 2.2rem !important; }
      header p { letter-spacing: 3px; font-size: 0.7rem !important; }
      .site-logo { height: 45px; }
    }

    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
  <div class="wrapper">
<header>
  <div class="header-content">
    <div class="menu-toggle" onclick="toggleMenu()">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

      <div class="logo-container">
    <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="obxtodo logo" class="site-logo">
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
  </div>
          <p>{{ site.description }}</p>
  </div>
</header>

<div id="side-menu" class="side-menu">
  <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
  <div class="menu-links">
    <a href="{{ '/' | relative_url }}">Home</a>
     <a href="{{ '/about/' | relative_url }}" class="{% if page.url contains 'about' %}active{% endif %}">About</a>


    <span class="menu-label">Guides</span>
    
    {% assign sorted_pages = site.gallery | sort: "nav_order" %| reverse %}
    {% for p in sorted_pages %}
      {% if p.nav_show == true %}
        <a href="{{ p.url | relative_url }}" class="{% if page.url == p.url %}active{% endif %}">
          {{ p.title }}
        </a>
      {% endif %}
    {% endfor %}

    <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.05); margin: 20px 0;">
    
    <span class="menu-label">Social</span>
    <a href="https://instagram.com/obxtodo" target="_blank" class="social-link">
  <i class="fa-brands fa-instagram"></i>
  <span>Instagram</span>
</a>
  </div>
</div>
    <section>{{ content }}</section>
  </div>
  <div style="margin-bottom: 50px;"></div>
  <script>
  function toggleMenu() {
    const menu = document.getElementById("side-menu");
    menu.classList.toggle("open");
  }

  // Close menu if user clicks outside of it
  document.addEventListener('click', function(event) {
    const menu = document.getElementById("side-menu");
    const toggle = document.querySelector(".menu-toggle");
    if (!menu.contains(event.target) && !toggle.contains(event.target) && menu.classList.contains("open")) {
      toggleMenu();
    }
  });
</script>
</body>
</html>
