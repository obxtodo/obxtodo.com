<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* 1. MASTER THEME RESET */
    html, body {
      background-color: #ffffff !important;
      color: #5a5a5a !important; 
      font-family: 'Quicksand', sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* Elegant Serif for Titles */
    header h1, h2, h3, .post-content h2 {
      font-family: 'Lora', serif !important;
      font-weight: 700 !important;
      color: #2c3e50 !important;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING */
    header {
      width: 100% !important;
      float: none !important;
      position: static !important;
      text-align: center !important;
      padding: 80px 0 40px 0 !important;
      border-bottom: 1px solid #f5f5f5;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 3.2rem !important;
      font-style: italic;
      margin: 0 !important;
    }

    header h1 a {
      color: #2c3e50 !important;
      text-decoration: none !important;
      transition: opacity 0.2s ease;
    }

    header h1 a:hover { opacity: 0.7; }

    header p {
      font-family: 'Quicksand', sans-serif !important;
      font-weight: 500;
      letter-spacing: 2px;
      font-size: 0.9rem !important;
      color: #7f8c8d !important;
      margin-top: 10px !important;
      text-transform: uppercase;
    }

    /* 4. NAVIGATION */
    nav { margin-top: 30px; }
    nav a {
      font-family: 'Quicksand', sans-serif !important;
      font-size: 0.9rem !important;
      font-weight: 600;
      margin: 0 15px;
      color: #34495e !important;
      text-decoration: none !important;
      transition: all 0.2s;
    }
    
    nav a:hover { 
      color: #3498db !important; 
      border-bottom: 2px solid #3498db;
      padding-bottom: 5px;
    }

    /* 5. SPLIDE CUSTOMIZATION */
    .splide__pagination__page {
      background: #ddd !important;
      border-radius: 0 !important;
      width: 25px !important;
      height: 3px !important;
      border: none !important;
      margin: 0 5px !important;
      transition: all 0.3s ease !important;
    }
    .splide__pagination__page.is-active {
      background: #3498db !important;
      width: 45px !important;
    }

    /* 6. FLEXBOX FOR GALLERY POSTS */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
    }
    .post-media { flex: 1.3; max-width: 600px; }
    .post-content { flex: 1; }
    .post-content h2 { font-size: 2.4rem; margin-bottom: 15px; }

    /* 7. HOMEPAGE GRID */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
      gap: 40px !important;
      padding-bottom: 80px;
    }
    .gallery-item {
      border: none !important;
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    /* 8. HIDE THEME ARTIFACTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr {
      display: none !important;
    }

    /* 9. RESPONSIVE MOBILE FIX */
    @media (max-width: 768px) {
      .post-container { flex-direction: column; }
      .post-media, .post-content { width: 100%; }
      header { padding: 50px 0 !important; }
      header h1 { font-size: 2.4rem !important; }
    }

    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}">Gallery</a>
        <a href="https://instagram.com/obxtodo" target="_blank">Instagram</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>

    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
