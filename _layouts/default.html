<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* 1. MASTER THEME RESET & TYPOGRAPHY */
    html, body {
      background-color: #ffffff !important;
      background-image: none !important;
      color: #444444 !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    header h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif !important;
      color: #222222 !important;
      letter-spacing: -0.02em;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER, BRANDING & NAV */
    header {
      width: 100% !important;
      float: none !important;
      position: static !important;
      text-align: center !important;
      padding: 80px 0 40px 0 !important;
      border-bottom: 1px solid #f5f5f5;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 2.8rem !important;
      margin: 0 !important;
    }

    header h1 a {
      color: #222 !important;
      text-decoration: none !important;
      transition: opacity 0.2s ease;
    }

    header h1 a:hover { opacity: 0.7; }

    header p {
      color: #999 !important;
      font-size: 1.1rem !important;
      margin-top: 12px !important;
      font-style: italic;
    }

    nav a {
      margin: 0 15px;
      font-weight: 500;
      color: #333 !important;
      text-decoration: none !important;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    nav a:hover { color: #0077cc !important; }

    /* 4. SPLIDE CUSTOMIZATION (Minimalist Progress Bars) */
    .splide__pagination__page {
      background: #ddd !important;
      border-radius: 0 !important;
      width: 20px !important;
      height: 3px !important;
      transition: all 0.3s !important;
      border: none !important;
      margin: 0 4px !important;
    }

    .splide__pagination__page.is-active {
      background: #333 !important;
      width: 40px !important; /* Elongates the active bar */
      transform: scale(1) !important;
    }

    /* 5. FLEXBOX LAYOUT (Image Left / Text Right) */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
    }

    .post-media { flex: 1.3; max-width: 600px; }
    .post-content { flex: 1; }

    /* 6. HOMEPAGE GRID */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
      gap: 40px !important;
      padding-bottom: 80px;
    }

    .gallery-item {
      border: none !important;
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    /* 7. HIDE THEME ARTIFACTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr {
      display: none !important;
    }

    /* 8. RESPONSIVE MOBILE FIX */
    @media (max-width: 768px) {
      .post-container { flex-direction: column; }
      .post-media, .post-content { max-width: 100%; width: 100%; }
      header { padding: 50px 0 !important; }
      header h1 { font-size: 2rem !important; }
    }

    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      
      <nav style="margin-top: 30px;">
        <a href="{{ site.baseurl }}/">Gallery</a>
        <a href="https://instagram.com/obxtodo" target="_blank">Instagram</a>
        <a href="{{ site.baseurl }}/about">About</a>
      </nav>
    </header>

    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
