<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    /* 1. MASTER THEME RESET & TYPOGRAPHY */
    html, body {
      background-color: #ffffff !important;
      background-image: none !important;
      color: #444444 !important; /* Softer professional grey */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Editorial Style for Headings */
    header h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif !important;
      color: #222222 !important;
      letter-spacing: -0.02em;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING (Centered Layout) */
    header {
      width: 100% !important;
      float: none !important;
      position: static !important;
      text-align: center !important;
      padding: 80px 0 40px 0 !important;
      border-bottom: 1px solid #f5f5f5;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 2.8rem !important;
      margin: 0 !important;
    }

    header h1 a {
      color: #222 !important;
      text-decoration: none !important;
      transition: opacity 0.2s ease;
    }

    header h1 a:hover {
      opacity: 0.7;
    }

    header p {
      color: #999 !important;
      font-size: 1.1rem !important;
      margin-top: 12px !important;
      font-style: italic;
    }

    /* 4. CONTENT SECTION */
    section {
      width: 100% !important;
      float: none !important;
      padding: 0 !important;
    }

    /* 5. TWO-COLUMN GALLERY POST LAYOUT (Flexbox) */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
    }

    .post-media {
      flex: 1.3;
      max-width: 600px;
    }

    .post-content {
      flex: 1;
    }

    /* 6. HOMEPAGE GRID (Glassmorphism & Interactive) */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
      gap: 40px !important;
      padding-bottom: 80px;
    }

    .gallery-item {
      border: none !important;
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 0; /* Let the container handle the radius */
    }

    .gallery-item h3 {
      padding: 20px;
      font-size: 1.4rem;
      margin: 0;
      text-align: center;
    }

    /* 7. HIDE THEME ARTIFACTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr {
      display: none !important;
    }
