<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  
<style>
  /* 1. CLEAN MODERN RESET */
  html, body {
    background-color: #ffffff !important;
    color: #444444 !important;
    /* Montserrat for everything */
    font-family: 'Montserrat', sans-serif !important;
    margin: 0;
    padding: 0;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  /* 2. HEADERS (Same font, just Bolder) */
  header h1, h2, h3, h4, .post-content h2 {
    font-family: 'Montserrat', sans-serif !important;
    font-weight: 700 !important;
    color: #2c3e50 !important;
    text-transform: uppercase;
    letter-spacing: 3px; /* Added spacing for that coastal brand feel */
    margin-top: 0;
  }

  header h1 {
    font-size: 2.2rem !important;
    margin-bottom: 0 !important;
  }

  header p {
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 5px;
    font-size: 0.8rem !important;
    color: #95a5a6 !important;
    margin-top: 15px !important;
  }

  /* 3. NAVIGATION (Uniform with the rest) */
  nav { margin-top: 30px; }
  nav a {
    font-size: 0.75rem !important;
    letter-spacing: 2px;
    font-weight: 600;
    margin: 0 15px;
    color: #2c3e50 !important;
    text-decoration: none !important;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  nav a:hover { color: #3498db !important; }

  /* 4. LAYOUT CONSTRAINTS */
  .wrapper {
    width: 90% !important;
    max-width: 1050px !important;
    margin: 0 auto !important;
    float: none !important;
    position: relative !important;
  }

  header {
    text-align: center !important;
    padding: 80px 0 40px 0 !important;
    border-bottom: 1px solid #f5f5f5;
    margin-bottom: 50px;
  }

  /* 5. SPLIDE & GRID STYLING */
  .splide__pagination__page {
    background: #ddd !important;
    border-radius: 0 !important;
    width: 20px !important;
    height: 3px !important;
    border: none !important;
  }
  .splide__pagination__page.is-active {
    background: #2c3e50 !important;
    width: 400px !important;
  }

  .gallery-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
    gap: 40px !important;
  }

  .gallery-item {
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.4s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }
  .gallery-item:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  }

  /* 6. FLEXBOX FOR GALLERY POSTS */
  .post-container {
    display: flex;
    flex-direction: row;
    gap: 60px;
    align-items: flex-start;
    margin-bottom: 80px;
  }
  .post-media { flex: 1.3; max-width: 600px; }
  .post-content { flex: 1; }

  /* 7. HIDE GITHUB STUFF */
  footer, .wrapper footer, header p.view, header ul, .owner, hr {
    display: none !important;
  }

  @media (max-width: 768px) {
    .post-container { flex-direction: column; }
    .post-media, .post-content { width: 100%; }
  }
  img { max-width: 100%; height: auto; display: block; }
</style>  
  
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      
      <nav style="margin-top: 30px;">
        <a href="{{ site.baseurl }}/">Gallery</a>
        <a href="https://instagram.com/obxtodo" target="_blank">Instagram</a>
        <a href="{{ site.baseurl }}/about">About</a>
      </nav>
    </header>

    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
