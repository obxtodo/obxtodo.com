<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* 1. MASTER THEME RESET */
    html, body {
      background-color: #ffffff !important;
      color: #5a5a5a !important; 
      font-family: 'Montserrat', sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    /* Elegant Serif for Titles */
    header h1, h2, h3, .post-content h2 {
      font-family: 'Lora', serif !important;
      font-weight: 700 !important;
      color: #2c3e50 !important;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING (Frosted Glass & Centered) */
    header {
      position: sticky !important;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 35px 0 !important; 
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      text-align: center !important;
      width: 100%;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 3.2rem !important;
      font-style: italic;
      margin: 0 !important;
    }

    header h1 a {
      color: #2c3e50 !important;
      text-decoration: none !important;
      transition: opacity 0.3s ease;
    }

    header h1 a:hover { opacity: 0.7; }

    header p {
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 0.8rem !important;
      color: #95a5a6 !important;
      margin-top: 15px !important;
    }

    /* 4. NAVIGATION (Modern Animated Underline) */
    nav { margin-top: 30px; }
    
    nav a {
      font-family: 'Montserrat', sans-serif !important;
      font-size: 0.75rem !important;
      letter-spacing: 2px;
      font-weight: 600;
      margin: 0 18px;
      color: #2c3e50 !important;
      text-decoration: none !important;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 6px;
      display: inline-block;
      transition: color 0.3s ease;
    }
    
    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 50%;
      background-color: #3498db;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
    }
    
    nav a:hover::after {
      width: 70%;
    }

    nav a:hover {
      color: #3498db !important;
    }

    /* Permanent underline for the current page */
    nav a.active::after {
      width: 70%;
      background-color: #3498db;
    }
    
    nav a.active {
      color: #3498db !important;
    }

    /* 5. SPLIDE CUSTOMIZATION */
    .splide__pagination__page {
      background: #ddd !important;
      border-radius: 0 !important;
      width: 25px !important;
      height: 3px !important;
      border: none !important;
      margin: 0 5px !important;
      transition: all 0.3s ease !important;
    }
    .splide__pagination__page.is-active {
      background: #3498db !important;
      width: 45px !important;
    }

    /* 6. FLEXBOX FOR POSTS */
    .post-container {
      display: flex;
      flex-direction: row;
      gap: 60px;
      align-items: flex-start;
      margin-bottom: 80px;
    }
    .post-media { flex: 1.3; max-width: 600px; }
    .post-content { flex: 1; }
    .post-content h2 { font-size: 1.8rem; margin-bottom: 15px; }

    /* 7. HOMEPAGE GRID & DYNAMIC EFFECTS */
    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important;
      gap: 40px !important;
      padding-bottom: 80px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gallery-item {
      border: none !important;
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0; /* Ensures clean fade-in */
    }

    /* Staggered Delay for Grid Items */
    .gallery-item:nth-child(1) { animation-delay: 0.1s; }
    .gallery-item:nth-child(2) { animation-delay: 0.2s; }
    .gallery-item:nth-child(3) { animation-delay: 0.3s; }
    .gallery-item:nth-child(4) { animation-delay: 0.4s; }
    .gallery-item:nth-child(5) { animation-delay: 0.5s; }
    .gallery-item:nth-child(6) { animation-delay: 0.6s; }

    .gallery-item:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
    }

    .gallery-item img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.6s ease;
    }
    
    .gallery-item:hover img {
      transform: scale(1.08);
      filter: brightness(1.05) contrast(1.05);
    }

    /* 8. CLEANUP THEME ELEMENTS */
    footer, .wrapper footer, header p.view, header ul, .owner, hr {
      display: none !important;
    }

    /* 9. RESPONSIVE FIXES */
    @media (max-width: 768px) {
      .post-container { flex-direction: column; }
      .post-media, .post-content { width: 100%; }
      header { padding: 30px 0 !important; }
      header h1 { font-size: 2.2rem !important; }
      header p { letter-spacing: 3px; font-size: 0.7rem !important; }
      .post-container { gap: 30px; }
    }

    img { max-width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
<nav>
  <a href="{{ '/' | relative_url }}" 
     class="{% if page.url == '/' %}active{% endif %}">Gallery</a>
     
  <a href="https://instagram.com/obxtodo" target="_blank">Instagram</a>
  
  <a href="{{ '/about/' | relative_url }}" 
     class="{% if page.url contains 'about' %}active{% endif %}">About</a>
</nav>
    </header>

    <section>
      {{ content }}
    </section>
  </div>

</body>
</html>
