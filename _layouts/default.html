<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* 1. MASTER THEME RESET */
    html, body {
      background-color: #ffffff !important;
      color: #5a5a5a !important; 
      font-family: 'Montserrat', sans-serif !important;
      margin: 0;
      padding: 0;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    /* Elegant Serif for Titles */
    header h1, h2, h3, .post-content h2 {
      font-family: 'Lora', serif !important;
      font-weight: 700 !important;
      color: #2c3e50 !important;
      margin-top: 0;
    }

    /* 2. CONTAINER CONSTRAINTS */
    .wrapper {
      width: 90% !important;
      max-width: 1050px !important;
      margin: 0 auto !important;
      float: none !important;
      position: relative !important;
      background: #ffffff !important;
    }

    /* 3. HEADER & BRANDING (Frosted Glass & Centered) */
    header {
      position: sticky !important;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 35px 0 !important; 
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      text-align: center !important;
      width: 100%;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 3.2rem !important;
      font-style: italic;
      margin: 0 !important;
    }

    header h1 a {
      color: #2c3e50 !important;
      text-decoration: none !important;
      transition: opacity 0.3s ease;
    }

    header h1 a:hover { opacity: 0.7; }

    header p {
      font-family: 'Montserrat', sans-serif !important;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 0.8rem !important;
      color: #95a5a6 !important;
      margin-top: 15px !important;
    }

    /* 4. NAVIGATION (Modern Animated Underline) */
    nav { margin-top: 30px; }
    
    nav a {
      font-family: 'Montserrat', sans-serif !important;
      font-size: 0.75rem !important;
      letter-spacing: 2px;
      font-weight: 600;
      margin: 0 18px;
      color: #2c3e50 !important;
      text-decoration: none !important;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 6px;
      display: inline-block;
      transition: color 0.3s ease;
    }
    
    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 50%;
      background-color: #3498db;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(-50%);
    }
    
    nav a:hover::after {
      width: 70%;
    }
