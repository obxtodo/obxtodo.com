---
layout: default
---

<div class="post-container">
  
  <div class="post-media">
    {% for img in page.images %}
       <img src="{{ site.baseurl }}{{ img }}" style="width:100%; border-radius:12px; margin-bottom:10px;">
    {% endfor %}
  </div>

  <div class="post-content">
    <h1>{{ page.title }}</h1>
    
    <div class="description" style="white-space: pre-wrap; margin-bottom: 20px;">
      {{ page.description }}
    </div>

    {% if page.instagram_url %}
      <a href="{{ page.instagram_url }}" class="button" style="display:inline-block; padding: 10px 20px; background: #333; color: #fff; border-radius: 5px;">
        View on Instagram
      </a>
    {% endif %}
  </div>

</div>
