---
layout: default
---

<div class="post-container">
  <div class="post-media">
    <section id="image-carousel" class="splide" aria-label="Beautiful OBX Photos">
      <div class="splide__track">
        <ul class="splide__list">
          {% for img in page.images %}
          <li class="splide__slide">
            <img src="{{ site.baseurl }}{{ img }}" style="width:100%; border-radius:12px;">
          </li>
          {% endfor %}
        </ul>
      </div>
    </section>
  </div>

  <div class="post-content">
    <h2 style="margin-top: 0;">{{ page.title }}</h2>
    <div style="white-space: pre-wrap; margin-bottom: 25px; color: #555;">{{ page.description | lstrip }}</div>
    <a href="{{ page.instagram_url }}" target="_blank" class="instagram-btn">
      <i class="fa-brands fa-instagram"></i>
      <span>View on Instagram</span>
    </a>
  </div>
</div>

<div class="week-header" style="margin-bottom: 30px; margin-top: 40px;">
  <h3 style="margin-bottom: 5px;">{{ page.title }} - Upcoming</h3>
  <p style="font-size: 0.9rem; color: #7f8c8d;">
    Showing events for: 
    <strong id="start-date-display">...</strong> – 
    <strong id="end-date-display">...</strong>
  </p>
</div>

<div id="dynamic-event-list" class="event-list" style="margin-bottom: 50px;">
  <p style="text-align: center; color: #64748b; padding: 20px;">Loading upcoming schedule...</p>
</div>

<script id="events-data" type="application/json">
[
  {% for event in site.data.events %}
    {
      "name": {{ event.name | jsonify }},
      "sort_id": {{ event.sort_id | default: 999 }},
      "start": "{{ event.date }}",
      "end": "{{ event.end_date | default: event.date }}",
      "time": {{ event.time | jsonify }},
      "location": {{ event.location | jsonify }},
      "link": {{ event.link | jsonify }},
      "category": {{ event.category | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

<script>
  // Setup Carousel
  document.addEventListener('DOMContentLoaded', function () {
    if (document.querySelector('#image-carousel')) {
      new Splide('#image-carousel', { 
        type: 'loop', 
        drag: 'free', 
        snap: true,
        arrows: true,
        pagination: true 
      }).mount();
    }
    
    // Initial Run for Events
    renderFilteredEvents();
  });

  const pageCategory = "{{ page.category_filter }}";

  function renderFilteredEvents() {
    const container = document.getElementById('dynamic-event-list');
    const dataElement = document.getElementById('events-data');
    if (!container || !dataElement) return;

    let events = JSON.parse(dataElement.textContent);
    
    // Get local today
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    const todayObj = new Date(now - offset);
    const todayStr = todayObj.toISOString().slice(0, 10);

    // Calculate end of 7-day window for header display
    const endWindowObj = new Date(todayObj);
    endWindowObj.setDate(todayObj.getDate() + 7);
    
    // Update Header Dates Dynamically
    const dateOptions = { month: 'short', day: 'numeric' };
    document.getElementById('start-date-display').textContent = todayObj.toLocaleDateString('en-US', dateOptions);
    document.getElementById('end-date-display').textContent = endWindowObj.toLocaleDateString('en-US', dateOptions);

    // 1. PRIMARY FILTER: All Upcoming (expires today or later)
    let filtered = events.filter(e => todayStr <= (e.end || e.start));

    // 2. SECONDARY FILTER: Category
    if (pageCategory && pageCategory !== "" && pageCategory !== "null") {
        filtered = filtered.filter(e => e.category === pageCategory);
    }

    // 3. SORT: By sort_id
    filtered.sort((a, b) => (a.sort_id || 999) - (b.sort_id || 999));

    if (filtered.length > 0) {
        container.innerHTML = ''; 
        filtered.forEach(event => {
            const d = new Date(event.start + 'T00:00:00');
            const isMultiDay = event.end && event.end !== event.start;

            container.innerHTML += `
              <div class="event-card" style="display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 15px;">
                <a href="${event.link}" class="btn-sm" target="_blank" style="flex-shrink: 0;">Details</a>

                <div class="event-info" style="flex-grow: 1; min-width: 0;">
                  <div class="title-row" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <h4 style="margin: 0;">${event.name}</h4>
                    ${isMultiDay ? '<span class="multi-day-tag">Multi-Day</span>' : ''}
                  </div>
                  <p class="location-time" style="margin: 4px 0 0 0;">
                    <i class="fa-solid fa-location-dot"></i> ${event.location} • ${event.time}
                  </p>
                </div>

                <div class="date-container" style="display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; min-width: 60px;">
                  <div class="date-badge">
                    <span class="month">${d.toLocaleString('default', { month: 'short' })}</span>
                    <span class="day">${d.getDate()}</span>
                  </div>
                </div>
              </div>`;
        });
    } else {
        container.innerHTML = `<p style="text-align: center; color: #64748b; padding: 40px; border: 1px dashed #ccc; border-radius: 12px;">No upcoming ${pageCategory || ''} events found at this time.</p>`;
    }
  }
</script>
